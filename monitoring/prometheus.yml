global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ivms-api'
    static_configs:
      - targets: ['api:8000']

  - job_name: 'ivms-ingestion'
    static_configs:
      - targets: ['ingestion:9090']

  # IVMS ADDITION — Enterprise External API Layer
  - job_name: 'ivms-web'
    static_configs:
      - targets: ['web:5000']
    metrics_path: '/metrics'
