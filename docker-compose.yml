version: '3.8'

services:
  web:
    build: .
    ports:
      - "${FLASK_PORT:-5000}:5000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
      - flask_cache:/app/.cache/flask_cache

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-ivmsdb}
      POSTGRES_USER: ${DB_USER:-ivmsuser}
      POSTGRES_PASSWORD: ${DB_PASS:-ivms_secure_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  flask_cache:
