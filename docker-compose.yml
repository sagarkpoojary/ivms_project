version: '3.8'

services:
  web:
    build: .
    # Removed public port mapping, NGINX will proxy to 5000
    expose:
      - "5000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
      - flask_cache:/app/.cache/flask_cache
    restart: unless-stopped

  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: ${DB_NAME:-ivmsdb}
      POSTGRES_USER: ${DB_USER:-ivmsuser}
      POSTGRES_PASSWORD: ${DB_PASS:-ivms_secure_2026}
    command: postgres -c shared_preload_libraries=timescaledb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    ports:
      - "5027:5027"
      - "9090:9090"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    # Removed public port mapping, NGINX will proxy to 8000
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  flask_cache:
  redis_data:
