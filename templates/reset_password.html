<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>IVMS — Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      background: linear-gradient(135deg, #f0f4ff 0%, #e8edf8 100%);
      font-family: 'Inter', system-ui, Arial;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      width: 100%; max-width: 420px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(20,30,80,0.12);
      border: none; padding: 2.5rem 2rem;
    }
    .brand-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.4rem;
      margin: 0 auto 1.25rem;
      box-shadow: 0 8px 20px rgba(16,185,129,0.3);
    }
    .brand-title { font-weight: 700; color: #1e293b; font-size: 1.4rem; }
    .brand-sub   { color: #64748b; font-size: 0.875rem; }
    .form-control {
      border-radius: 10px; border: 1.5px solid #e2e8f0;
      padding: 0.7rem 1rem; font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.12);
    }
    .btn-success {
      background: linear-gradient(135deg, #10b981, #059669);
      border: none; border-radius: 10px;
      font-weight: 600; padding: 0.75rem;
      font-size: 0.95rem; color: #fff;
      transition: all 0.2s;
    }
    .btn-success:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(16,185,129,0.35); color: #fff; }
    .password-wrapper { position: relative; }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #94a3b8; cursor: pointer; padding: 0;
    }
    .toggle-pw:hover { color: #475569; }
    .strength-bar { height: 4px; border-radius: 4px; margin-top: 6px; transition: all 0.3s; }
    .alert { border-radius: 10px; font-size: 0.9rem; }
    .req-item { font-size: 0.82rem; color: #94a3b8; }
    .req-item.met { color: #10b981; }
    .req-item i { margin-right: 5px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="text-center mb-4">
      <div class="brand-icon"><i class="fas fa-lock-open"></i></div>
      <div class="brand-title">Create New Password</div>
      <div class="brand-sub mt-1">Choose a strong password for your account</div>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 mb-3">
      <i class="fas fa-exclamation-circle me-1"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/reset-password/{{ token }}" novalidate id="resetForm">
      <div class="mb-3">
        <label class="form-label fw-medium" style="font-size:0.9rem;color:#374151;">New Password</label>
        <div class="password-wrapper">
          <input name="password" id="newPassword" type="password" class="form-control"
                 placeholder="Min. 8 characters" required autofocus
                 oninput="checkStrength(this.value)">
          <button type="button" class="toggle-pw" onclick="togglePw('newPassword', this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div class="strength-bar mt-1" id="strengthBar" style="background:#e2e8f0;width:0%"></div>
        <div class="mt-2 d-flex gap-3 flex-wrap">
          <span class="req-item" id="req-len"><i class="fas fa-circle-xmark"></i>8+ chars</span>
          <span class="req-item" id="req-upper"><i class="fas fa-circle-xmark"></i>Uppercase</span>
          <span class="req-item" id="req-num"><i class="fas fa-circle-xmark"></i>Number</span>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-medium" style="font-size:0.9rem;color:#374151;">Confirm Password</label>
        <div class="password-wrapper">
          <input name="confirm_password" id="confirmPassword" type="password" class="form-control"
                 placeholder="Repeat new password" required>
          <button type="button" class="toggle-pw" onclick="togglePw('confirmPassword', this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="d-grid mb-3">
        <button class="btn btn-success" type="submit">
          <i class="fas fa-check me-2"></i>Reset Password
        </button>
      </div>
    </form>
    <div class="text-center">
      <a href="/login" style="color:#64748b;font-size:0.875rem;text-decoration:none;">
        <i class="fas fa-arrow-left me-1"></i> Back to Login
      </a>
    </div>
  </div>

  <script>
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const icon  = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }

    function checkStrength(val) {
      const bar     = document.getElementById('strengthBar');
      const reqLen  = document.getElementById('req-len');
      const reqUpper= document.getElementById('req-upper');
      const reqNum  = document.getElementById('req-num');

      const hasLen   = val.length >= 8;
      const hasUpper = /[A-Z]/.test(val);
      const hasNum   = /[0-9]/.test(val);

      const toggle = (el, met) => {
        el.classList.toggle('met', met);
        el.querySelector('i').className = met ? 'fas fa-circle-check' : 'fas fa-circle-xmark';
      };
      toggle(reqLen,   hasLen);
      toggle(reqUpper, hasUpper);
      toggle(reqNum,   hasNum);

      const score = [hasLen, hasUpper, hasNum].filter(Boolean).length;
      const colors = ['#ef4444','#f59e0b','#10b981'];
      const widths = ['33%','66%','100%'];
      bar.style.width      = score ? widths[score-1] : '0%';
      bar.style.background = score ? colors[score-1] : '#e2e8f0';
    }
  </script>
</body>
</html>
