<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IVMS - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: #f5f7fb; font-family: Inter, system-ui, Arial; }
    .card { max-width: 420px; margin: 8vh auto; border-radius: 12px; box-shadow: 0 8px 30px rgba(20,20,50,0.06); }
    .brand { font-weight:700; color:#0d63f8; }
    .sidebar-placeholder { position: absolute; left:24px; top:24px; color:#0d63f8; font-weight:600; }
  </style>
</head>
<body>
  <div class="card p-4">
    <div class="text-center mb-3">
      <div class="brand h4">IVMS Reports</div>
      <div class="text-muted small">Log in to view vehicle reports</div>
    </div>
    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success py-2">{{ success }}</div>
    {% endif %}

    <form method="post" action="/login" novalidate>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input name="email" type="text" class="form-control" placeholder="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control" placeholder="password" required>
      </div>
      <div class="d-grid">
        <button class="btn btn-primary">Sign in</button>
      </div>
      <div class="text-center mt-3">
        <a href="/forgot-password" style="font-size:0.875rem;color:#6c757d;text-decoration:none;">
          <i class="fas fa-key me-1"></i>Forgot password?
        </a>
      </div>
    </form>

  </div>
</body>
</html>
