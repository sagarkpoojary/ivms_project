<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>IVMS — Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      background: linear-gradient(135deg, #f0f4ff 0%, #e8edf8 100%);
      font-family: 'Inter', system-ui, Arial;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(20,30,80,0.12);
      border: none;
      padding: 2.5rem 2rem;
    }
    .brand-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.4rem;
      margin: 0 auto 1.25rem;
      box-shadow: 0 8px 20px rgba(37,99,235,0.3);
    }
    .brand-title { font-weight: 700; color: #1e293b; font-size: 1.4rem; }
    .brand-sub   { color: #64748b; font-size: 0.875rem; }
    .form-control {
      border-radius: 10px; border: 1.5px solid #e2e8f0;
      padding: 0.7rem 1rem; font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border: none; border-radius: 10px;
      font-weight: 600; padding: 0.75rem;
      font-size: 0.95rem; letter-spacing: 0.01em;
      transition: all 0.2s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.35); }
    .back-link { color: #64748b; font-size: 0.875rem; text-decoration: none; }
    .back-link:hover { color: #2563eb; }
    .alert { border-radius: 10px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="text-center mb-4">
      <div class="brand-icon"><i class="fas fa-key"></i></div>
      <div class="brand-title">Forgot Password?</div>
      <div class="brand-sub mt-1">Enter your email and we'll send a reset link</div>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 mb-3">
      <i class="fas fa-exclamation-circle me-1"></i> {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success py-2 mb-3">
      <i class="fas fa-check-circle me-1"></i> {{ success }}
    </div>
    <div class="text-center mt-3">
      <a href="/login" class="back-link"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
    </div>
    {% else %}
    <form method="post" action="/forgot-password" novalidate>
      <div class="mb-4">
        <label class="form-label fw-medium" style="font-size:0.9rem;color:#374151;">Email Address</label>
        <input name="email" type="email" class="form-control" placeholder="your@email.com" required autofocus>
      </div>
      <div class="d-grid mb-3">
        <button class="btn btn-primary" type="submit">
          <i class="fas fa-paper-plane me-2"></i>Send Reset Link
        </button>
      </div>
    </form>
    <div class="text-center">
      <a href="/login" class="back-link"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
    </div>
    {% endif %}
  </div>
</body>
</html>
