{% extends "base.html" %}

{% block content %}
<style>
    .history-table-wrap {
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.04);
    }
    .history-table th {
        background: #f8fafc;
        color: #64748b;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border: none;
        padding: 14px 16px;
    }
    .history-table td {
        padding: 14px 16px;
        vertical-align: middle;
        border-color: #f1f5f9;
    }
    .status-pill {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
    }
    .status-pill.completed { background: #dcfce7; color: #16a34a; }
    .status-pill.cancelled { background: #f1f5f9; color: #64748b; }
    .empty-state {
        text-align: center;
        padding: 80px 20px;
        color: #94a3b8;
    }
    .empty-state i { font-size: 4rem; margin-bottom: 16px; }
</style>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">Service History</h2>
            <p class="text-muted">Completed maintenance records for your fleet</p>
        </div>
        <a href="/maintenance" class="btn btn-outline-primary rounded-pill px-4">
            <i class="fas fa-calendar me-2"></i>Calendar View
        </a>
    </div>

    <div class="history-table-wrap">
        <div id="historyContent">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading service history...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/maintenance/history')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('historyContent');
            const items = data || [];

            if (!items.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-clipboard-list"></i>
                        <h5 class="mt-3">No Service History</h5>
                        <p>Completed maintenance records will appear here.</p>
                    </div>`;
                return;
            }

            let html = `
            <table class="table history-table mb-0">
                <thead>
                    <tr>
                        <th>Vehicle</th>
                        <th>Service Type</th>
                        <th>Description</th>
                        <th>Scheduled Date</th>
                        <th>Completed Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>`;

            items.forEach(item => {
                html += `
                    <tr>
                        <td class="fw-semibold">${item.vehicle_id || '—'}</td>
                        <td>${item.service_type || '—'}</td>
                        <td class="text-muted">${item.description || '—'}</td>
                        <td>${item.target_date || '—'}</td>
                        <td>${item.completed_at || '—'}</td>
                        <td><span class="status-pill ${item.status}">${item.status || 'completed'}</span></td>
                    </tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        })
        .catch(() => {
            document.getElementById('historyContent').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle text-warning"></i>
                    <p>Failed to load service history.</p>
                </div>`;
        });
});
</script>
{% endblock %}
