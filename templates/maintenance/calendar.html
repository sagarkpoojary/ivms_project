{% extends "base.html" %}

{% block content %}
<style>
    .fc-header-toolbar {
        margin-bottom: 2rem !important;
    }

    .fc-button-primary {
        background-color: var(--primary) !important;
        border-color: var(--primary) !important;
        border-radius: 8px !important;
        padding: 8px 16px !important;
        font-weight: 600 !important;
        transition: all 0.2s ease !important;
    }

    .fc-button-primary:hover {
        background-color: var(--primary-hover) !important;
        border-color: var(--primary-hover) !important;
    }

    .fc-event {
        border: none !important;
        padding: 6px 10px !important;
        border-radius: 8px !important;
        font-size: 0.85rem !important;
        font-weight: 500 !important;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .fc-event:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .event-planned {
        background-color: var(--primary) !important;
        color: #fff !important;
    }

    .event-due {
        background-color: var(--warning) !important;
        color: #fff !important;
    }

    .event-overdue {
        background-color: var(--danger) !important;
        color: #fff !important;
    }

    .event-completed {
        background-color: var(--success) !important;
        color: #fff !important;
    }
</style>

<!-- FullCalendar CSS -->
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h3 class="fw-bold mb-0 text-dark"><i class="fas fa-calendar-alt text-primary me-2"></i> Maintenance Calendar</h3>
            <p class="text-muted small mb-0">Schedule and track fleet service activities</p>
        </div>
        <button class="btn btn-primary shadow-sm rounded-3 px-4 py-2" data-bs-toggle="modal" data-bs-target="#scheduleModal">
            <i class="fas fa-plus me-2"></i>Schedule Activity
        </button>
    </div>

    <!-- Stat Dashboard Cards -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card card-premium p-4">
                <div class="text-muted small fw-bold text-uppercase"><i class="fas fa-calendar text-primary me-1"></i> Total Planned</div>
                <div class="h2 fw-bold mb-0 mt-2 text-dark" id="statPlanned">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-premium p-4">
                <div class="text-warning small fw-bold text-uppercase"><i class="fas fa-clock me-1"></i> Upcoming Due</div>
                <div class="h2 fw-bold mb-0 mt-2 text-dark" id="statDue">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-premium p-4">
                <div class="text-danger small fw-bold text-uppercase"><i class="fas fa-exclamation-triangle me-1"></i> Overdue</div>
                <div class="h2 fw-bold mb-0 mt-2 text-dark" id="statOverdue">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-premium p-4">
                <div class="text-success small fw-bold text-uppercase"><i class="fas fa-check-circle me-1"></i> Completed (Mo)</div>
                <div class="h2 fw-bold mb-0 mt-2 text-dark" id="statCompleted">0</div>
            </div>
        </div>
    </div>

    <!-- Calendar Container -->
    <div class="card card-premium p-4 mb-4">
        <div id='calendar'></div>
    </div>
</div>

<!-- Schedule Maintenance Modal -->
<div class="modal fade" id="scheduleModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow-lg">
            <div class="modal-header border-0 pb-0 p-4">
                <h5 class="modal-title fw-bold text-dark"><i class="fas fa-tools text-primary me-2"></i>Schedule Maintenance Activity</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="maintForm">
                <div class="modal-body p-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="outlined-group">
                                <select name="imei" id="maintVehicle" class="form-select" required>
                                    <option value="">Select Vehicle</option>
                                    <!-- Populated via JS -->
                                </select>
                                <label class="form-label">Vehicle</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="outlined-group">
                                <select name="service_type" class="form-select" required>
                                    <option value="Oil Change">Oil Change</option>
                                    <option value="Tire Rotation">Tire Rotation</option>
                                    <option value="Brake Inspection">Brake Inspection</option>
                                    <option value="Annual Service">Annual Service</option>
                                    <option value="Engine Repair">Engine Repair</option>
                                    <option value="Other">Other</option>
                                </select>
                                <label class="form-label">Service Type</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="outlined-group">
                                <textarea name="description" class="form-control" rows="3" placeholder="Describe the work to be done..." required></textarea>
                                <label class="form-label">Description / Instructions</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="outlined-group">
                                <input type="date" name="target_date" class="form-control" required>
                                <label class="form-label">Target Date</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="outlined-group">
                                <input type="number" name="target_mileage" class="form-control" placeholder="e.g. 50000">
                                <label class="form-label">Target Mileage (KM)</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="outlined-group">
                                <input type="number" name="target_engine_hours" class="form-control" placeholder="e.g. 2000">
                                <label class="form-label">Target Engine Hours</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light rounded-3 px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary rounded-3 px-4"><i class="fas fa-save me-2"></i>Schedule Activity</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,listMonth'
            },
            themeSystem: 'bootstrap5',
            events: '/api/maintenance/schedule',
            eventDataTransform: function (data) {
                return {
                    id: data.id,
                    title: `${data.vehicle_id}: ${data.service_type}`,
                    start: data.target_date,
                    className: `event-${data.status}`,
                    extendedProps: data
                };
            },
            eventClick: function (info) {
                alert(`Service: ${info.event.title}\nVehicle: ${info.event.extendedProps.vehicle_id}\nStatus: ${info.event.extendedProps.status}`);
            }
        });
        calendar.render();

        // Populate Vehicles
        fetch('/api/vehicles/list')
            .then(res => res.json())
            .then(vehicles => {
                const select = document.getElementById('maintVehicle');
                vehicles.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.unique_id;
                    opt.dataset.name = v.name;
                    opt.innerText = v.name;
                    select.appendChild(opt);
                });
            });

        // Form Submit
        document.getElementById('maintForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            const vehicleSelect = document.getElementById('maintVehicle');
            const selectedOpt = vehicleSelect.options[vehicleSelect.selectedIndex];
            data.vehicle_name = selectedOpt.dataset.name;

            try {
                const res = await fetch('/api/maintenance/schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('scheduleModal')).hide();
                    calendar.refetchEvents();
                }
            } catch (err) {
                alert("Failed to schedule maintenance");
            }
        };

        if (!Object.from_iterable) {
            Object.from_iterable = function (iterable) {
                const obj = {};
                for (const [key, val] of iterable) {
                    obj[key] = val;
                }
                return obj;
            }
        }
    });
</script>
{% endblock %}
