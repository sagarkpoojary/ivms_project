{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Notification Rules</h2>
        {% if role != 'user' %}
        <button class="btn btn-primary" onclick="openAddRuleModal()">
            <i class="fas fa-plus me-2"></i>Add Rule
        </button>
        {% endif %}
    </div>

    <div id="alert-container"></div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0" id="rules-table">
                <thead class="table-light">
                    <tr>
                        <th>Type</th>
                        <th>Channels</th>
                        <th>Description</th>
                        {% if role != 'user' %}
                        <th>Actions</th>
                        {% endif %}
                    </tr>
                </thead>
                <tbody>
                    <!-- Rules will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Rule Modal -->
<div class="modal fade" id="addRuleModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Notification Rule</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addRuleForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Type</label>
                        <select class="form-select" id="ruleType" required>
                            <option value="">Select Type...</option>
                            <option value="deviceOverspeed">Speed limit exceeded</option>
                            <option value="deviceOffline">Device offline</option>
                            <option value="deviceOnline">Device online</option>
                            <option value="geofenceEnter">Geofence entered</option>
                            <option value="geofenceExit">Geofence exited</option>
                            <option value="ignitionOn">Ignition on</option>
                            <option value="ignitionOff">Ignition off</option>
                            <option value="alarm">Alarm events</option>
                            <option value="maintenance">Maintenance required</option>
                            <option value="driverChanged">Driver changed</option>
                            <option value="fuelDrop">Fuel drop</option>
                            <option value="fuelIncrease">Fuel increase</option>
                            <option value="commandResult">Command result</option>
                            <option value="deviceMoving">Device moving</option>
                            <option value="deviceStopped">Device stopped</option>
                            <option value="deviceInactive">Device inactive</option>
                            <option value="queuedCommandSent">Queued command sent</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Channels</label>
                        <div id="channels-container" class="border p-2 rounded bg-light">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" value="web" id="channel_web">
                                <label class="form-check-label" for="channel_web">Web</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" value="mail" id="channel_mail">
                                <label class="form-check-label" for="channel_mail">Email</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" value="command" id="channel_command">
                                <label class="form-check-label" for="channel_command">Command</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Devices</label>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="allDevices"
                                onchange="toggleDeviceSelection()">
                            <label class="form-check-label" for="allDevices">All Devices</label>
                        </div>
                        <select class="form-select" id="deviceSelect" multiple size="5">
                            <!-- Devices loaded via JS -->
                        </select>
                        <div class="form-text">Hold Ctrl/Cmd to select multiple devices.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Description</label>
                        <input type="text" class="form-control" id="ruleDescription" placeholder="Optional description">
                    </div>

                    <!-- Dynamic Attributes -->
                    <div class="mb-3" id="speed-limit-container" style="display:none;">
                        <label class="form-label fw-bold">Speed Limit (knots)</label>
                        <input type="number" class="form-control" id="speedLimit" placeholder="e.g. 50">
                    </div>

                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rulePriority">
                            <label class="form-check-label" for="rulePriority">High Priority</label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="handleAddRuleSubmit()">Save Rule</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/notifications.js"></script>
{% endblock %}
