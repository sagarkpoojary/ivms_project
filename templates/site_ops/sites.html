{% extends "base.html" %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h3 class="fw-bold mb-0 text-dark"><i class="fas fa-building text-primary me-2"></i> Site Registry</h3>
            <p class="text-muted small mb-0">Manage industrial sites and geofence operational parameters</p>
        </div>
        <button class="btn btn-primary shadow-sm rounded-3 px-4 py-2" data-bs-toggle="modal" data-bs-target="#addSiteModal">
            <i class="fas fa-plus me-1"></i> Add New Site
        </button>
    </div>

    <!-- Desktop Table View -->
    <div class="card card-premium border-0 shadow-sm rounded-4 d-none d-md-block mb-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Site ID</th>
                            <th>Site Name</th>
                            <th>Location</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sitesTableBody">
                        <!-- Loaded via API -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Mobile Fluid Cards View -->
    <div class="d-block d-md-none" id="sitesMobileContainer">
        <!-- Loaded via API -->
    </div>
</div>

<!-- Add Site Modal -->
<div class="modal fade" id="addSiteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pb-0 p-4">
                <h5 class="modal-title fw-bold text-dark"><i class="fas fa-building text-primary me-2"></i>Register New Site</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="addSiteForm">
                    <div class="mb-3">
                        <div class="outlined-group">
                            <input type="text" class="form-control" name="site_id" required placeholder="e.g. SITE-001">
                            <label class="form-label">Site ID</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="outlined-group">
                            <input type="text" class="form-control" name="name" required placeholder="Main Depot">
                            <label class="form-label">Name</label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <div class="outlined-group">
                                <input type="number" step="any" class="form-control" name="latitude" required placeholder="e.g. 23.58">
                                <label class="form-label">Latitude</label>
                            </div>
                        </div>
                        <div class="col-6 mb-3">
                            <div class="outlined-group">
                                <input type="number" step="any" class="form-control" name="longitude" required placeholder="e.g. 58.40">
                                <label class="form-label">Longitude</label>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="outlined-group">
                            <input type="number" class="form-control" name="radius" value="100" placeholder="e.g. 100">
                            <label class="form-label">Radius (meters)</label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0 p-4">
                <button type="button" class="btn btn-light rounded-3" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="addSiteForm" class="btn btn-primary rounded-3 px-4"><i class="fas fa-save me-2"></i>Save Site</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    async function loadSites() {
        const res = await fetch('/api/v2/ops/sites');
        const sites = await res.json();
        const tbody = document.getElementById('sitesTableBody');
        const mobContainer = document.getElementById('sitesMobileContainer');
        
        if (sites.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">No sites registered yet.</td></tr>';
            mobContainer.innerHTML = '<p class="text-muted text-center py-4">No sites registered yet.</p>';
            return;
        }

        // Render Desktop Rows
        tbody.innerHTML = sites.map(s => `
            <tr>
                <td class="fw-bold text-primary">${s.site_id}</td>
                <td class="fw-semibold text-dark">${s.name}</td>
                <td class="small text-muted">${s.latitude.toFixed(4)}, ${s.longitude.toFixed(4)}</td>
                <td><span class="badge badge-soft-info">${s.site_type || 'Industrial'}</span></td>
                <td><span class="badge badge-soft-success">Active</span></td>
                <td class="text-end">
                    <button class="btn btn-sm btn-outline-primary rounded-3 me-1" onclick="editSite('${s.site_id}')"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-sm btn-outline-danger rounded-3" onclick="deleteSite('${s.site_id}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');

        // Render Mobile Cards View
        mobContainer.innerHTML = sites.map(s => `
            <div class="mobile-table-card card-premium mb-3">
                <div class="d-flex justify-content-between align-items-center mb-2 border-bottom pb-2">
                    <strong class="text-primary fs-6">${s.site_id}</strong>
                    <span class="badge badge-soft-success">Active</span>
                </div>
                <div class="mobile-table-card-row">
                    <span class="mobile-table-card-label">Site Name</span>
                    <span class="mobile-table-card-value fw-bold text-dark">${s.name}</span>
                </div>
                <div class="mobile-table-card-row">
                    <span class="mobile-table-card-label">Location</span>
                    <span class="mobile-table-card-value small text-muted">${s.latitude.toFixed(4)}, ${s.longitude.toFixed(4)}</span>
                </div>
                <div class="mobile-table-card-row">
                    <span class="mobile-table-card-label">Type</span>
                    <span class="badge badge-soft-info">${s.site_type || 'Industrial'}</span>
                </div>
                <div class="d-flex justify-content-end gap-2 mt-3 pt-2 border-top">
                    <button class="btn btn-sm btn-outline-primary rounded-3" onclick="editSite('${s.site_id}')"><i class="fas fa-edit me-1"></i>Edit</button>
                    <button class="btn btn-sm btn-outline-danger rounded-3" onclick="deleteSite('${s.site_id}')"><i class="fas fa-trash me-1"></i>Delete</button>
                </div>
            </div>
        `).join('');
    }

    document.getElementById('addSiteForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        const res = await fetch('/api/v2/ops/sites', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            bootstrap.Modal.getInstance(document.getElementById('addSiteModal')).hide();
            loadSites();
        }
    });

    document.addEventListener('DOMContentLoaded', loadSites);
</script>
{% endblock %}
