{% extends "base.html" %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0 text-dark"><i class="fas fa-building text-primary me-2"></i> Site Registry</h3>
        <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addSiteModal">
            <i class="fas fa-plus me-1"></i> Add New Site
        </button>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Site ID</th>
                            <th>Site Name</th>
                            <th>Location</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sitesTableBody">
                        <!-- Loaded via API -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add Site Modal -->
<div class="modal fade" id="addSiteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Register New Site</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addSiteForm">
                    <div class="mb-3">
                        <label class="form-label">Site ID</label>
                        <input type="text" class="form-control" name="site_id" required placeholder="e.g. SITE-001">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" name="name" required placeholder="Main Depot">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Latitude</label>
                            <input type="number" step="any" class="form-control" name="latitude" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Longitude</label>
                            <input type="number" step="any" class="form-control" name="longitude" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Radius (meters)</label>
                        <input type="number" class="form-control" name="radius" value="100">
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="addSiteForm" class="btn btn-primary">Save Site</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    async function loadSites() {
        const res = await fetch('/api/v2/ops/sites');
        const sites = await res.json();
        const tbody = document.getElementById('sitesTableBody');
        
        if (sites.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">No sites registered yet.</td></tr>';
            return;
        }

        tbody.innerHTML = sites.map(s => `
            <tr>
                <td class="fw-bold text-primary">${s.site_id}</td>
                <td>${s.name}</td>
                <td class="small">${s.latitude.toFixed(4)}, ${s.longitude.toFixed(4)}</td>
                <td><span class="badge bg-soft-info">${s.site_type || 'Industrial'}</span></td>
                <td><span class="badge bg-soft-success">Active</span></td>
                <td>
                    <button class="btn btn-sm btn-light border" onclick="editSite('${s.site_id}')"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-sm btn-soft-danger border" onclick="deleteSite('${s.site_id}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    document.getElementById('addSiteForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        const res = await fetch('/api/v2/ops/sites', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            bootstrap.Modal.getInstance(document.getElementById('addSiteModal')).hide();
            loadSites();
        }
    });

    document.addEventListener('DOMContentLoaded', loadSites);
</script>
{% endblock %}
