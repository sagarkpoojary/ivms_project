{% extends "base.html" %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0 text-dark"><i class="fas fa-history text-primary me-2"></i> Driver Sessions</h3>
        <div class="d-flex gap-2">
            <select id="periodFilter" class="form-select border-0 shadow-sm" onchange="loadSessions()">
                <option value="Today" selected>Today</option>
                <option value="Yesterday">Yesterday</option>
                <option value="This Week">This Week</option>
            </select>
            <button class="btn btn-primary shadow-sm" onclick="loadSessions()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Driver</th>
                            <th>Vehicle</th>
                            <th>Event</th>
                            <th>Location</th>
                        </tr>
                    </thead>
                    <tbody id="sessionsTableBody">
                        <!-- Loaded via API -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function loadSessions() {
        const period = document.getElementById('periodFilter').value;
        const res = await fetch(`/api/v2/ops/rfid-timeline?period=${period}`);
        const data = await res.json();
        const tbody = document.getElementById('sessionsTableBody');
        
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted">No driver sessions recorded for this period.</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(row => `
            <tr>
                <td>${new Date(row.timestamp).toLocaleString()}</td>
                <td class="fw-bold">${row.driver_name || row.driver_id}</td>
                <td>${row.imei}</td>
                <td>
                    <span class="badge ${row.event_type === 'login' ? 'bg-soft-success' : 'bg-soft-secondary'}">
                        ${row.event_type.toUpperCase()}
                    </span>
                </td>
                <td class="small text-muted">${row.latitude.toFixed(4)}, ${row.longitude.toFixed(4)}</td>
            </tr>
        `).join('');
    }

    document.addEventListener('DOMContentLoaded', loadSessions);
</script>
{% endblock %}
