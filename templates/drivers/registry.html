{% extends "base.html" %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0 text-dark"><i class="fas fa-users text-primary me-2"></i> Driver Registry</h3>
        <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addDriverModal">
            <i class="fas fa-user-plus me-1"></i> Register Driver
        </button>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Driver ID</th>
                            <th>Full Name</th>
                            <th>RFID Tag</th>
                            <th>License #</th>
                            <th>Dept/Team</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="driversTableBody">
                        <!-- Loaded via API -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add Driver Modal -->
<div class="modal fade" id="addDriverModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Register New Driver</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addDriverForm">
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Driver ID</label>
                            <input type="text" class="form-control" name="driver_id" required placeholder="D-1234">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">RFID Tag</label>
                            <input type="text" class="form-control" name="rfid_tag" placeholder="Optional">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" name="phone">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">License #</label>
                            <input type="text" class="form-control" name="license_number">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Department</label>
                            <input type="text" class="form-control" name="department">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Team</label>
                            <input type="text" class="form-control" name="team">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="addDriverForm" class="btn btn-primary">Save Driver</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function loadDrivers() {
        const res = await fetch('/api/v2/ops/drivers');
        const drivers = await res.json();
        const tbody = document.getElementById('driversTableBody');
        
        if (drivers.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">No drivers registered yet.</td></tr>';
            return;
        }

        tbody.innerHTML = drivers.map(d => `
            <tr>
                <td class="fw-bold text-primary">${d.driver_id}</td>
                <td>
                    <div class="fw-bold">${d.name}</div>
                    <div class="small text-muted">${d.phone || ''}</div>
                </td>
                <td><span class="badge bg-soft-info">${d.rfid_tag || 'None'}</span></td>
                <td>${d.license_number || 'N/A'}</td>
                <td>
                    <div class="small fw-bold">${d.department || ''}</div>
                    <div class="x-small text-muted">${d.team || ''}</div>
                </td>
                <td>
                    <button class="btn btn-sm btn-light border"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-sm btn-soft-danger border"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    document.getElementById('addDriverForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        const res = await fetch('/api/v2/ops/drivers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            bootstrap.Modal.getInstance(document.getElementById('addDriverModal')).hide();
            loadDrivers();
        }
    });

    document.addEventListener('DOMContentLoaded', loadDrivers);
</script>
{% endblock %}
