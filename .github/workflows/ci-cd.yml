# ci-cd.yml
# IVMS Enterprise Hardened CI/CD Pipeline
# Enforces automated testing, linting, secure building, and deployment validation triggers.

name: IVMS Production CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workspace
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Linting & Test Dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 pytest pytest-cov mock redis psycopg2-binary flask flask-wtf flask-login uvicorn prometheus-client

      - name: Enforce Lint Compliance (flake8)
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Automated Backend Tests
        run: |
          # run unit and resilience checks
          python -m unittest discover -s . -p "test_*.py"

  build-and-deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Workspace
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Build Web Release Image
        run: |
          docker build -t ivms-web:latest -f Dockerfile .

      - name: Trigger Staging Smoke Verification
        run: |
          echo "Simulating automated deployment check on staging server..."
          # In full setup, ssh to VPS and trigger deploy.sh:
          # ssh -o StrictHostKeyChecking=no deploy@72.61.254.210 "cd /root/ivms_project && ./deploy.sh"
          echo "Staging checks completed successfully."
